# Spice Town Labels — CI/CD
#
# What this does:
#   • On every push / PR: install deps + run the full pytest suite (Python 3.12).
#   • On push to main: build the Docker image and push it to GHCR
#     (ghcr.io/<owner>/spicetown-labels:latest and :<git-sha>).
#
# GitHub Actions does NOT host the app — it produces a tested, versioned image.
# Deploy that image on-prem (docker compose pull/up) or to AWS (ECS/EC2/App
# Runner). See docs/ENGINEERING_HANDOFF.md (§6–7).
#
# To push to AWS ECR instead of GHCR, swap the login/build steps for
# aws-actions/configure-aws-credentials + aws-actions/amazon-ecr-login.

name: ci

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install label fonts (for renderer)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends fonts-dejavu-core

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          STL_ENV: testing
        run: pytest -q

  build-and-push:
    # Only ship an image after tests pass, and only from main.
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # push to GHCR
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags/labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ───────────────────────────────────────────────────────────────────────────
  # OPTIONAL: deploy to AWS ECS after the image is pushed. Disabled by default
  # (guarded on a repo variable) so it won't fail without AWS setup.
  # Enable by setting repository variable DEPLOY_AWS=true and the secrets below.
  # ───────────────────────────────────────────────────────────────────────────
  deploy-aws:
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && vars.DEPLOY_AWS == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

      # Re-deploy the existing ECS service so it pulls the new image tag.
      # (Assumes the task definition already references the GHCR/ECR image.)
      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster "${{ secrets.ECS_CLUSTER }}" \
            --service "${{ secrets.ECS_SERVICE }}" \
            --force-new-deployment
