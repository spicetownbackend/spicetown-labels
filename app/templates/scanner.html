<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="theme-color" content="#b00000">
  <title>{{ store_name }} — Label Scanner</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body>
  <header class="topbar">
    <span class="logo">🌶️ {{ store_name }}</span>
    <span class="status-dots">
      <span id="provider-badge" class="badge" title="data provider">{{ provider }}</span>
      <span id="printer-badge" class="badge" title="printer">{{ printer or 'no printer' }}</span>
    </span>
  </header>

  <main>
    <!-- ── Scanner ─────────────────────────────────────────────── -->
    <section id="scanner-card" class="card">
      <div class="scanner-wrap">
        <div id="viewport"></div>
        <div class="scan-line"></div>
      </div>
      <div class="controls">
        <button id="btn-start" class="btn btn-primary">▶ Start camera</button>
        <button id="btn-stop" class="btn" hidden>⏹ Stop</button>
      </div>
      <form id="manual-form" class="manual">
        <input id="manual-input" inputmode="text" autocomplete="off"
               placeholder="Type a UPC or product name…">
        <button class="btn" type="submit">Search</button>
      </form>
      <div id="live-results" class="suggest-list live-results" hidden></div>
      <p id="scan-hint" class="hint">Point the camera at a barcode, or search by name/UPC above.</p>
      <button id="btn-custom" class="btn">✏️ Create custom label</button>
    </section>

    <!-- ── Custom label form ───────────────────────────────────── -->
    <section id="custom-card" class="card" hidden>
      <button id="btn-back3" class="btn btn-link">← Back</button>
      <h2>Create a custom label</h2>
      <form id="custom-form" class="custom-form">
        <label class="field">Name *
          <input id="c-name" required autocomplete="off" placeholder="e.g. Fresh Curry Leaves">
        </label>
        <div class="print-row">
          <label class="field">Price ($)
            <input id="c-price" type="number" step="0.01" min="0" inputmode="decimal"
                   placeholder="blank = no price">
          </label>
          <label class="field">Size
            <input id="c-size" autocomplete="off" placeholder="e.g. 1 bunch">
          </label>
        </div>
        <div class="print-row">
          <label class="field">Department
            <input id="c-dept" autocomplete="off" placeholder="e.g. Produce">
          </label>
          <label class="field">Barcode / UPC
            <input id="c-upc" autocomplete="off" placeholder="blank = auto">
          </label>
        </div>
        <button class="btn btn-primary btn-lg" type="submit">Create &amp; preview</button>
        <p id="custom-status" class="print-status"></p>
      </form>
    </section>

    <!-- ── Result / product ────────────────────────────────────── -->
    <section id="result-card" class="card" hidden>
      <button id="btn-back" class="btn btn-link">← Scan another</button>
      <div id="product-info"></div>

      <div class="preview-wrap">
        <img id="label-preview" alt="label preview" />
      </div>

      <div class="print-row">
        <label class="field">
          Variant
          <select id="variant-select">
            <option value="">Auto (from price)</option>
            <option value="standard">Standard</option>
            <option value="sale">Sale</option>
            <option value="clearance">Clearance</option>
            <option value="shelf">Shelf tag (no barcode)</option>
          </select>
        </label>
        <label class="field">
          Copies
          <input id="copies-input" type="number" min="1" max="50" value="1">
        </label>
      </div>

      <fieldset id="field-toggles" class="field-toggles">
        <legend>Include on label</legend>
        <label><input type="checkbox" data-field="name" checked> Name</label>
        <label><input type="checkbox" data-field="price" checked> Price</label>
        <label><input type="checkbox" data-field="barcode" checked> Barcode</label>
        <label><input type="checkbox" data-field="size" checked> Size</label>
        <label><input type="checkbox" data-field="department" checked> Department</label>
      </fieldset>

      <button id="btn-print" class="btn btn-primary btn-lg">🖨️ Print label</button>
      <p id="print-status" class="print-status"></p>
    </section>

    <!-- ── Suggestions / search results ────────────────────────── -->
    <section id="suggest-card" class="card" hidden>
      <button id="btn-back2" class="btn btn-link">← Back</button>
      <h2 id="suggest-title">No exact match</h2>
      <div id="suggest-list" class="suggest-list"></div>
    </section>
  </main>

  <div id="toast" class="toast" hidden></div>

  <!-- QuaggaJS (maintained quagga2 fork) via CDN. Vendor locally for offline. -->
  <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2@1.8.4/dist/quagga.min.js"></script>
  <script src="{{ url_for('static', filename='js/scanner.js') }}"></script>
</body>
</html>
